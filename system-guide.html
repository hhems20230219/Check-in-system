<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>系統說明 - 新興救護分隊出勤管理系統</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <!-- GitHub Markdown Style -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">

    <!-- marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>

        /* =========================
           全站背景
        ========================= */
        body {
            background-color: #f8f9fa;
        }

        /* =========================
           Navbar Icon
        ========================= */
        .brand-medical-icon {
            color: #dc3545;
        }

        /* =========================
           Markdown 區塊
        ========================= */
        .markdown-body {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid #dee2e6;
        }

        /* =========================
           手機版
        ========================= */
        @media (max-width: 576px) {

            .markdown-body {
                padding: 1rem;
            }

        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container">

            <a class="navbar-brand fw-bold"
               href="./index.html">
                <i class="fa-solid fa-truck-medical me-2 brand-medical-icon"></i>
                新興救護分隊出勤管理系統
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse"
                 id="mainNavbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                           href="./index.html">
                            <i class="fa-solid fa-house me-1"></i>
                            首頁
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active"
                           href="./system-guide.html">
                            <i class="fa-solid fa-book me-1"></i>
                            系統說明
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <!-- Main -->
    <main class="container my-4">

        <div id="markdownContainer"
             class="markdown-body">
            讀取中...
        </div>

    </main>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        /* =========================
           讀取 Markdown
        ========================= */
        fetch("./readme.md")
            .then(function (response) {

                if (!response.ok) {
                    throw new Error("讀取 Markdown 失敗");
                }

                return response.text();
            })
            .then(function (markdownText) {

                document.getElementById("markdownContainer").innerHTML =
                    marked.parse(markdownText);

            })
            .catch(function (error) {

                document.getElementById("markdownContainer").innerHTML =
                    `
                    <div class="alert alert-danger">
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        ${error.message}
                    </div>
                    `;

                console.error(error);
            });

    </script>

</body>
</html>
