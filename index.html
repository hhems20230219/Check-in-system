<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新興救護分隊出勤管理系統</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <link href="./index.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container">
    
            <a class="navbar-brand fw-bold" href="./index.html">
                <i class="fa-solid fa-truck-medical me-2 brand-medical-icon"></i>
                新興救護分隊出勤管理系統
            </a>
    
            <!-- 使用者資訊 -->
            <div class="navbar-user-area ms-auto d-flex align-items-center gap-3 order-lg-3">
    
                <span class="navbar-user-item text-nowrap">
                    <i class="fa-solid fa-building me-1"></i>
                    <span id="navUnit">-</span>
                </span>
    
                <span class="navbar-user-item text-nowrap">
                    <i class="fa-solid fa-id-badge me-1"></i>
                    <span id="navTitle">-</span>
                </span>
    
                <span class="navbar-user-item text-nowrap">
                    <i class="fa-solid fa-user me-1"></i>
                    <span id="navName">-</span>
                </span>
    
                <button id="btnOpenUserModal"
                        class="btn btn-outline-primary btn-sm fw-bold text-nowrap">
                    <i class="fa-solid fa-right-left me-1"></i>
                    切換
                </button>
    
            </div>
    
            <!-- 漢堡按鈕 -->
            <button class="navbar-toggler ms-2 order-lg-2"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar"
                    aria-controls="mainNavbar"
                    aria-expanded="false"
                    aria-label="切換導覽選單">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <!-- 導覽列 -->
            <div class="collapse navbar-collapse order-lg-1" id="mainNavbar">
                <ul class="navbar-nav ms-lg-3">
            
                    <!-- 首頁 -->
                    <li class="nav-item">
                        <a class="nav-link active"
                           aria-current="page"
                           href="./index.html">
                            <i class="fa-solid fa-house me-1"></i>
                            首頁
                        </a>
                    </li>
            
                    <!-- 資料匯出 -->
                    <li class="nav-item">
                        <a class="nav-link"
                           href="./export.html">
                            <i class="fa-solid fa-file-export me-1"></i>
                            資料匯出
                        </a>
                    </li>
            
                    <!-- 系統說明 -->
                    <li class="nav-item">
                        <a class="nav-link"
                           href="./system-guide.html">
                            <i class="fa-solid fa-book me-1"></i>
                            系統說明
                        </a>
                    </li>
            
                </ul>
            </div>
    
        </div>
    </nav>

    <main class="container my-4">
        <section class="card rounded-4 mb-3">
            <div class="card-body text-center bg-dark text-white rounded-4">
                <div id="currentTime" class="display-5 fw-bold">00:00:00</div>
                <div id="currentDate" class="small">YYYY-MM-DD</div>
            </div>
        </section>

        <section class="card rounded-4 mb-3">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center gap-2">
        
                    <h5 class="card-title mb-0 fw-bold d-flex align-items-center gap-2">
                        <span class="fs-5">
                            <i class="fa-solid fa-location-dot me-2"></i>定位狀態
                        </span>
        
                        <span id="locationStatusBadge"
                              class="badge text-bg-secondary fs-6 px-3 py-2">
                            尚未定位
                        </span>
                    </h5>
        
                    <button id="btnRefreshLocation"
                            class="btn btn-outline-success fw-bold text-nowrap">
                        <i class="fa-solid fa-location-crosshairs me-1"></i>重新定位
                    </button>
        
                </div>
            </div>
        </section>

        <section id="alertArea" class="alert d-none" role="alert"></section>

        <section class="card rounded-4 mb-3">
            <div class="card-body d-grid gap-2">
                <button id="btnOpenCheckInModal" class="btn btn-success btn-lg fw-bold">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>簽到
                </button>
                <button id="btnOpenCheckOutModal" class="btn btn-danger btn-lg fw-bold">
                    <i class="fa-solid fa-right-from-bracket me-2"></i>簽退
                </button>
            </div>
        </section>

        <section class="row g-3 mb-3">
        
            <!-- 總協勤時數 -->
            <div class="col-md-4">
                <div class="card rounded-4 h-100 shadow-sm">
                    <div class="card-body">
        
                        <h6 class="fw-bold d-flex align-items-center gap-2 mb-3">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>總協勤時數</span>
                        </h6>
        
                        <div class="summary-number">
                            <span id="summaryTotalHours">0</span> 小時
                        </div>
        
                        <div class="text-muted summary-note mt-2">
                            累計已完成協勤時數
                        </div>
        
                    </div>
                </div>
            </div>
        
            <!-- 本月協勤時數 -->
            <div class="col-md-4">
                <div class="card rounded-4 h-100 shadow-sm">
                    <div class="card-body">
        
                        <h6 class="fw-bold d-flex align-items-center gap-2 mb-3">
                            <i class="fa-solid fa-calendar-check"></i>
                            <span id="summaryMonthTitle">本月協勤時數</span>
                        </h6>
        
                        <div class="summary-number">
                            <span id="summaryMonthHours">0</span> 小時
                        </div>
        
                        <div class="progress mt-3">
                            <div id="monthProgress"
                                 class="progress-bar"
                                 style="width:0%">
                                0%
                            </div>
                        </div>
        
                        <div id="summaryMonthNote"
                             class="text-muted summary-note mt-2">
                            目標：每月 4 小時
                        </div>
        
                    </div>
                </div>
            </div>
        
            <!-- 常年訓練次數 -->
            <div class="col-md-4">
                <div class="card rounded-4 h-100 shadow-sm">
                    <div class="card-body">
        
                        <h6 class="fw-bold d-flex align-items-center gap-2 mb-3">
                            <i class="fa-solid fa-address-card"></i>
                            <span>
                                <span id="summaryTrainingYear"></span>
                                常年訓練次數
                            </span>
                        </h6>
        
                        <div class="summary-number">
                            <span id="summaryTrainingCount">0</span> 次
                        </div>
        
                        <div class="progress mt-3">
                            <div id="trainingProgress"
                                 class="progress-bar"
                                 style="width:0%">
                                0%
                            </div>
                        </div>
        
                        <div class="text-muted summary-note mt-2">
                            <span id="summaryTrainingCountText">0/12次</span>
                        </div>
        
                    </div>
                </div>
            </div>
        
        </section>

        <section class="card rounded-4">
            <div class="card-body">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-2 mb-3">
                    <h5 class="card-title mb-0">
                        <i class="fa-solid fa-table me-2"></i>出勤紀錄
                    </h5>

                    <div class="d-flex flex-column flex-md-row gap-2">
                        <select id="recordFilterMode" class="form-select w-auto">
                            <option value="all">全部</option>
                            <option value="month" selected>月份</option>
                            <option value="range">日期區間</option>
                        </select>

                        <input id="monthFilter" type="month" class="form-control w-auto">

                        <input id="startDateFilter" type="date" class="form-control w-auto d-none">
                        <input id="endDateFilter" type="date" class="form-control w-auto d-none">
                    </div>
                </div>

                <table id="attendanceTable" class="table table-striped table-bordered nowrap w-100">
                    <thead>
                        <tr>
                            <th>協勤種類</th>
                            <th>服勤類別</th>
                            <th>簽到日期</th>
                            <th>簽到時間</th>
                            <th>簽退日期</th>
                            <th>簽退時間</th>
                            <th>時數</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">切換使用者</h5>
                </div>
                <div class="modal-body">
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">單位</label>
                            <input id="userUnit" class="form-control locked-field" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label">職稱</label>
                            <input id="userTitle" class="form-control locked-field" readonly>
                        </div>
                    </div>

                    <label class="form-label">姓名</label>
                    <select id="userSelect" class="form-select"></select>
                </div>
                <div class="modal-footer">
                    <button id="btnSaveUser" class="btn btn-primary fw-bold">
                        <i class="fa-solid fa-check me-1"></i>確定
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 簽到 Modal -->
    <div class="modal fade" id="checkInModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">
                        <i class="fa-solid fa-right-to-bracket me-2"></i>簽到
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="checkInMessage" class="alert alert-danger d-none"></div>

                    <label class="form-label">
                        <i class="fa-solid fa-briefcase-medical me-1"></i>協勤種類<span class="required-mark">*</span>
                    </label>
                    <select id="checkInType" class="form-select mb-3">
                        <option value="協勤">協勤</option>
                        <option value="常年訓練">常年訓練</option>
                        <option value="公差勤務">公差勤務</option>
                    </select>

                    <div id="trainingActionArea" class="mb-3 d-none">
                        <label class="form-label">
                            <i class="fa-solid fa-list-check me-1"></i>服勤類別<span class="required-mark">*</span>
                        </label>
                        <select id="trainingAction" class="form-select">
                            <option value="簽到">簽到</option>
                            <option value="請假">請假</option>
                        </select>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">
                                <i class="fa-solid fa-id-badge me-1"></i>職稱
                            </label>
                            <input id="checkInTitle" class="form-control locked-field" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label">
                                <i class="fa-solid fa-user me-1"></i>姓名<span class="required-mark">*</span>
                            </label>
                            <select id="checkInName" class="form-select"></select>
                        </div>
                    </div>

                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label">
                                <i class="fa-solid fa-calendar-day me-1"></i>簽到日期<span class="required-mark">*</span>
                            </label>
                            <input id="checkInDate" type="date" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label">
                                <i class="fa-solid fa-clock me-1"></i>簽到時間<span class="required-mark">*</span>
                            </label>
                            <select id="checkInTime" class="form-select"></select>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button id="btnSubmitCheckIn" class="btn btn-primary fw-bold">
                        <i class="fa-solid fa-paper-plane me-1"></i>送出
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 簽退 Modal -->
    <div class="modal fade" id="checkOutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">
                        <i class="fa-solid fa-right-from-bracket me-2"></i>簽退
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="checkOutMessage" class="alert alert-danger d-none"></div>

                    <label class="form-label">
                        <i class="fa-solid fa-briefcase-medical me-1"></i>協勤種類<span class="required-mark">*</span>
                    </label>
                    <select id="checkOutType" class="form-select mb-3">
                        <option value="協勤">協勤</option>
                        <option value="公差勤務">公差勤務</option>
                    </select>

                    <div id="serviceTypeArea" class="mb-3">
                        <label class="form-label">
                            <i class="fa-solid fa-list-check me-1"></i>服勤類別<span class="required-mark">*</span>
                        </label>
                        <select id="serviceType" class="form-select">
                            <option value="待命協勤">待命協勤</option>
                            <option value="出勤">出勤</option>
                        </select>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">
                                <i class="fa-solid fa-id-badge me-1"></i>職稱
                            </label>
                            <input id="checkOutTitle" class="form-control locked-field" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label">
                                <i class="fa-solid fa-user me-1"></i>姓名<span class="required-mark">*</span>
                            </label>
                            <select id="checkOutName" class="form-select"></select>
                        </div>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">
                                <i class="fa-solid fa-calendar-check me-1"></i>簽退日期<span class="required-mark">*</span>
                            </label>
                            <input id="checkOutDate" type="date" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label">
                                <i class="fa-solid fa-clock me-1"></i>簽退時間<span class="required-mark">*</span>
                            </label>
                            <select id="checkOutTime" class="form-select"></select>
                        </div>
                    </div>

                    <div id="workContentArea" class="mb-3">
                        <label class="form-label">
                            <i class="fa-solid fa-pen-to-square me-1"></i>工作內容<span class="required-mark">*</span>
                        </label>
                        <textarea id="workContent" class="form-control" rows="3"></textarea>
                    </div>

                    <label class="form-label">
                        <i class="fa-solid fa-signature me-1"></i>簽名<span class="required-mark">*</span>
                    </label>
                    <canvas id="signatureCanvas" class="border rounded-3"></canvas>
                    <button id="btnClearSignature" type="button" class="btn btn-outline-secondary btn-sm mt-2">
                        <i class="fa-solid fa-eraser me-1"></i>清除簽名
                    </button>
                </div>

                <div class="modal-footer">
                    <button id="btnSubmitCheckOut" class="btn btn-warning fw-bold">
                        <i class="fa-solid fa-paper-plane me-1"></i>送出
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

    <script src="./location.js"></script>
    <script src="./index.js"></script>
</body>
</html>
