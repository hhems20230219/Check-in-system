<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新興救護分隊出勤管理系統</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/3.0.2/css/responsive.bootstrap5.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            <i class="fa-solid fa-truck-medical me-2"></i>新興救護分隊出勤管理系統
        </span>

        <div class="ms-auto d-flex align-items-center gap-3">
            <span><i class="fa-solid fa-building me-1"></i><span id="navUnit">-</span></span>
            <span><i class="fa-solid fa-id-badge me-1"></i><span id="navTitle">-</span></span>
            <span><i class="fa-solid fa-user me-1"></i><span id="navName">-</span></span>
            <button class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#userModal">
                <i class="fa-solid fa-right-left me-1"></i>切換
            </button>
        </div>
    </div>
</nav>

<main class="container py-4">

    <!-- 時間區 -->
    <section class="card rounded-4 mb-3">
        <div class="card-body text-center bg-dark text-white rounded-4">
            <div id="clockTime" class="clock-time">00:00:00</div>
            <div id="clockDate" class="clock-date">0000-00-00</div>
        </div>
    </section>

    <!-- 系統狀態通知區 -->
    <section id="systemAlert" class="alert d-none rounded-4" role="alert"></section>

    <!-- 定位區 -->
    <section class="card rounded-4 mb-3">
        <div class="card-body">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                <div>
                    <h5 class="mb-1"><i class="fa-solid fa-location-dot me-2"></i>定位狀態</h5>
                    <div id="locationStatus" class="text-muted">尚未定位</div>
                </div>
                <button id="btnLocate" class="btn btn-outline-success">
                    <i class="fa-solid fa-crosshairs me-1"></i>重新定位
                </button>
            </div>
        </div>
    </section>

    <!-- 操作按鈕區 -->
    <section class="card rounded-4 mb-3">
        <div class="card-body d-grid gap-2">
            <button id="btnOpenSignIn" class="btn btn-primary btn-lg">
                <i class="fa-solid fa-right-to-bracket me-2"></i>簽到
            </button>
            <button id="btnOpenSignOut" class="btn btn-warning btn-lg">
                <i class="fa-solid fa-right-from-bracket me-2"></i>簽退
            </button>
        </div>
    </section>

    <!-- Summary 區 -->
    <section class="row g-3 mb-3">
        <div class="col-md-4">
            <div class="card rounded-4 h-100">
                <div class="card-body">
                    <h6 class="fw-bold">本月協勤時數</h6>
                    <div class="fs-3 fw-bold"><span id="monthlyHours">0</span> 小時</div>
                    <div class="progress mt-2">
                        <div id="monthlyProgress" class="progress-bar" style="width:0%">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card rounded-4 h-100">
                <div class="card-body">
                    <h6 class="fw-bold">總協勤時數</h6>
                    <div class="fs-3 fw-bold"><span id="totalHours">0</span> 小時</div>
                    <div class="text-muted small">依出勤紀錄累計</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card rounded-4 h-100">
                <div class="card-body">
                    <h6 class="fw-bold"><span id="trainingYear">0000</span> 年常年訓練次數</h6>
                    <div class="fs-3 fw-bold"><span id="trainingCount">0</span> / 12 次</div>
                    <div class="progress mt-2">
                        <div id="trainingProgress" class="progress-bar" style="width:0%">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 出勤紀錄區 -->
    <section class="card rounded-4">
        <div class="card-body">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
                <h5 class="mb-0"><i class="fa-solid fa-table-list me-2"></i>出勤紀錄</h5>
                <input id="monthFilter" type="month" class="form-control month-filter">
            </div>

            <div class="table-responsive">
                <table id="recordTable" class="table table-striped table-bordered nowrap w-100">
                    <thead>
                        <tr>
                            <th>協勤種類</th>
                            <th>服勤類別</th>
                            <th>簽到日期</th>
                            <th>簽到時間</th>
                            <th>簽退日期</th>
                            <th>簽退時間</th>
                            <th>時數</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<!-- 使用者切換 Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content rounded-4">
            <div class="modal-header">
                <h5 class="modal-title">切換使用者</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label">單位</label>
                        <input id="userUnit" class="form-control" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label">職稱</label>
                        <input id="userTitle" class="form-control" readonly>
                    </div>
                </div>

                <div>
                    <label class="form-label">姓名</label>
                    <select id="userSelect" class="form-select"></select>
                </div>
            </div>

            <div class="modal-footer">
                <button id="btnSaveUser" class="btn btn-primary">確認切換</button>
            </div>
        </div>
    </div>
</div>

<!-- 簽到 Modal -->
<div class="modal fade" id="signInModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="signInForm" class="modal-content rounded-4">
            <div class="modal-header">
                <h5 class="modal-title">簽到</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <label class="form-label">協勤種類</label>
                <select id="signInDutyType" class="form-select mb-3">
                    <option value="協勤">協勤</option>
                    <option value="常年訓練">常年訓練</option>
                    <option value="公差勤務">公差勤務</option>
                </select>

                <div id="trainingStatusBox" class="mb-3 d-none">
                    <label class="form-label">常年訓練狀態</label>
                    <select id="trainingStatus" class="form-select">
                        <option value="簽到">簽到</option>
                        <option value="請假">請假</option>
                    </select>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label">職稱</label>
                        <input id="signInTitle" class="form-control" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label">姓名</label>
                        <input id="signInName" class="form-control" readonly>
                    </div>
                </div>

                <div class="row g-2">
                    <div class="col-6">
                        <label class="form-label">簽到日期</label>
                        <input id="signInDate" type="date" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">簽到時間</label>
                        <select id="signInTime" class="form-select" required></select>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" type="submit">送出簽到</button>
            </div>
        </form>
    </div>
</div>

<!-- 簽退 Modal -->
<div class="modal fade" id="signOutModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <form id="signOutForm" class="modal-content rounded-4">
            <div class="modal-header">
                <h5 class="modal-title">簽退</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <label class="form-label">協勤種類</label>
                <select id="signOutDutyType" class="form-select mb-3">
                    <option value="協勤">協勤</option>
                    <option value="公差勤務">公差勤務</option>
                </select>

                <div id="serviceTypeBox" class="mb-3">
                    <label class="form-label">服勤類別</label>
                    <select id="serviceType" class="form-select">
                        <option value="待命協勤">待命協勤</option>
                        <option value="出勤">出勤</option>
                    </select>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label">職稱</label>
                        <input id="signOutTitle" class="form-control" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label">姓名</label>
                        <input id="signOutName" class="form-control" readonly>
                    </div>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label">簽退日期</label>
                        <input id="signOutDate" type="date" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">簽退時間</label>
                        <select id="signOutTime" class="form-select" required></select>
                    </div>
                </div>

                <div id="workContentBox" class="mb-3">
                    <label class="form-label">工作內容</label>
                    <textarea id="workContent" class="form-control" rows="3"></textarea>
                </div>

                <div>
                    <label class="form-label">簽名</label>
                    <canvas id="signatureCanvas" class="signature-canvas"></canvas>
                    <button id="btnClearSignature" type="button" class="btn btn-outline-secondary btn-sm mt-2">清除簽名</button>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-warning" type="submit">送出簽退</button>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.js"></script>
<script src="https://cdn.datatables.net/responsive/3.0.2/js/dataTables.responsive.js"></script>
<script src="https://cdn.datatables.net/responsive/3.0.2/js/responsive.bootstrap5.js"></script>

<script src="location.js"></script>
<script src="index.js"></script>
</body>
</html>
