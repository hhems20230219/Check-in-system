<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新興救護分隊出勤管理系統</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">
                <i class="fa-solid fa-truck-medical me-2"></i>新興救護分隊出勤管理系統
            </span>

            <div class="ms-auto d-flex align-items-center gap-3">
                <span><i class="fa-solid fa-building me-1"></i><span id="navUnit">-</span></span>
                <span><i class="fa-solid fa-id-badge me-1"></i><span id="navTitle">-</span></span>
                <span><i class="fa-solid fa-user me-1"></i><span id="navName">-</span></span>
                <button class="btn btn-outline-primary btn-sm" id="btnSwitchUser">
                    <i class="fa-solid fa-right-left me-1"></i>切換
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-3">
        <section class="section-box text-center bg-dark text-white">
            <div id="clockTime" class="clock-time">00:00:00</div>
            <div id="clockDate" class="clock-date">0000-00-00</div>
        </section>

        <section class="section-box mt-3">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold">
                        <i class="fa-solid fa-location-dot me-2"></i>定位區
                    </div>
                    <div id="locationText" class="text-muted small">尚未定位</div>
                </div>
                <button class="btn btn-outline-secondary btn-sm" id="btnRefreshLocation">
                    <i class="fa-solid fa-rotate me-1"></i>重新定位
                </button>
            </div>
        </section>

        <section id="statusBox" class="section-box mt-3 d-none">
            <div id="statusMessage" class="fw-bold"></div>
        </section>

        <section class="section-box mt-3">
            <div class="d-grid gap-2">
                <button class="btn btn-success btn-lg" id="btnOpenSignIn">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>簽到
                </button>
                <button class="btn btn-danger btn-lg" id="btnOpenSignOut">
                    <i class="fa-solid fa-right-from-bracket me-2"></i>簽退
                </button>
            </div>
        </section>

        <section class="section-box mt-3">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="summary-card">
                        <div class="text-muted small">本月協勤時數</div>
                        <div class="summary-value"><span id="monthlyHours">0</span> 小時</div>
                        <div class="progress">
                            <div id="monthlyProgress" class="progress-bar" style="width:0%"></div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="summary-card">
                        <div class="text-muted small">總協勤時數</div>
                        <div class="summary-value"><span id="totalHours">0</span> 小時</div>
                        <div class="progress">
                            <div id="totalProgress" class="progress-bar" style="width:0%"></div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="summary-card">
                        <div class="text-muted small"><span id="trainingYear">0000</span> 年常年訓練次數</div>
                        <div class="summary-value"><span id="trainingCount">0</span> 次</div>
                        <div class="progress">
                            <div id="trainingProgress" class="progress-bar" style="width:0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section-box mt-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0">
                    <i class="fa-solid fa-table-list me-2"></i>出勤紀錄
                </h5>
                <button class="btn btn-outline-primary btn-sm" id="btnReload">
                    <i class="fa-solid fa-arrows-rotate me-1"></i>重新整理
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>協勤種類</th>
                            <th>服勤類別</th>
                            <th>簽到日期</th>
                            <th>簽到時間</th>
                            <th>簽退日期</th>
                            <th>簽退時間</th>
                            <th>時數</th>
                        </tr>
                    </thead>
                    <tbody id="recordTableBody">
                        <tr>
                            <td colspan="7" class="text-center text-muted">尚無資料</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 使用者切換 Modal -->
    <div class="modal fade" id="userModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">切換使用者</h5>
                </div>
                <div class="modal-body">
                    <label class="form-label">姓名</label>
                    <select class="form-select" id="staffSelect"></select>

                    <div class="row g-2 mt-3">
                        <div class="col">
                            <label class="form-label">單位</label>
                            <input class="form-control" id="selectedUnit" readonly>
                        </div>
                        <div class="col">
                            <label class="form-label">職稱</label>
                            <input class="form-control" id="selectedTitle" readonly>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="btnSaveUser">確定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 簽到 Modal -->
    <div class="modal fade" id="signInModal" tabindex="-1">
        <div class="modal-dialog">
            <form class="modal-content" id="signInForm">
                <div class="modal-header">
                    <h5 class="modal-title">簽到</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <label class="form-label">協勤種類</label>
                    <select class="form-select mb-3" id="signInWorkType">
                        <option value="協勤">協勤</option>
                        <option value="常年訓練">常年訓練</option>
                        <option value="公差勤務">公差勤務</option>
                    </select>

                    <div id="signInDutyTypeArea">
                        <label class="form-label">服勤類別</label>
                        <select class="form-select mb-3" id="signInDutyType">
                            <option value="簽到">簽到</option>
                            <option value="請假">請假</option>
                        </select>
                    </div>

                    <div class="row g-2">
                        <div class="col">
                            <label class="form-label">簽到日期</label>
                            <input type="date" class="form-control" id="signInDate" required>
                        </div>
                        <div class="col">
                            <label class="form-label">簽到時間</label>
                            <input type="time" class="form-control" id="signInTime" step="1800" required>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" type="submit">送出簽到</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 簽退 Modal -->
    <div class="modal fade" id="signOutModal" tabindex="-1">
        <div class="modal-dialog">
            <form class="modal-content" id="signOutForm">
                <div class="modal-header">
                    <h5 class="modal-title">簽退</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <label class="form-label">協勤種類</label>
                    <select class="form-select mb-3" id="signOutWorkType">
                        <option value="協勤">協勤</option>
                        <option value="常年訓練">常年訓練</option>
                        <option value="公差勤務">公差勤務</option>
                    </select>

                    <div id="signOutDutyTypeArea">
                        <label class="form-label">服勤類別</label>
                        <select class="form-select mb-3" id="signOutDutyType">
                            <option value="待命協勤">待命協勤</option>
                            <option value="出勤">出勤</option>
                        </select>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col">
                            <label class="form-label">簽退日期</label>
                            <input type="date" class="form-control" id="signOutDate" required>
                        </div>
                        <div class="col">
                            <label class="form-label">簽退時間</label>
                            <input type="time" class="form-control" id="signOutTime" step="1800" required>
                        </div>
                    </div>

                    <div id="workContentArea">
                        <label class="form-label">工作內容</label>
                        <textarea class="form-control mb-3" id="workContent" rows="3"></textarea>
                    </div>

                    <label class="form-label">簽名</label>
                    <canvas id="signatureCanvas" width="450" height="180"></canvas>
                    <button type="button" class="btn btn-outline-secondary btn-sm mt-2" id="btnClearSignature">清除簽名</button>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-danger" type="submit">送出簽退</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const GAS_API_URL = "請貼上你的 Apps Script Web App URL";
    </script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="location.js"></script>
    <script src="index.js"></script>
</body>
</html>
