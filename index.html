<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個人查詢</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
  <link href="navbar.css" rel="stylesheet">
  <link href="index.css" rel="stylesheet">
</head>
<body>
  <div id="navbarContainer"></div>

  <main class="container my-4">
    <div class="alert alert-info rounded-3" id="pageAlert">
      <i class="fa-solid fa-circle-info me-1"></i>
      請先切換使用者
    </div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card rounded-3 h-100">
          <div class="card-header">
            <i class="fa-solid fa-user me-1"></i>基本資料
          </div>
          <div class="card-body">
            <ul class="list-group">
              <li class="list-group-item d-flex justify-content-between">
                <span>入隊日期</span>
                <strong id="entryDateText">-</strong>
              </li>
              <li class="list-group-item d-flex justify-content-between">
                <span>服務年資</span>
                <strong id="serviceYearsText">-</strong>
              </li>
              <li class="list-group-item d-flex justify-content-between">
                <span>緊急救護技術員證照</span>
                <strong id="emtLicenseText">-</strong>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card rounded-3 h-100">
          <div class="card-header">
            <i class="fa-solid fa-certificate me-1"></i>救護證照
          </div>
          <div class="card-body">
            <ul class="list-group" id="medicalLicenseList">
              <li class="list-group-item d-flex justify-content-between">
                <span>-</span><strong>-</strong>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card rounded-3 h-100">
          <div class="card-header">
            <i class="fa-solid fa-award me-1"></i>獲得獎項
          </div>
          <div class="card-body">
            <ul class="list-group" id="ownedAwardList">
              <li class="list-group-item d-flex justify-content-between">
                <span>-</span><strong>-</strong>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-lg-4">
        <div class="card rounded-3 h-100">
          <div class="card-header">
            <i class="fa-solid fa-clock me-1"></i>總出勤時數
          </div>
          <div class="card-body text-center">
            <div class="display-5 fw-bold" id="totalHoursText">0 小時</div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card rounded-3 h-100">
          <div class="card-header">
            <i class="fa-solid fa-calendar-days me-1"></i>
            <span id="monthlyTitleText">--月出勤時數</span>
          </div>
          <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
              <strong id="monthlyHoursText">0 / 4 小時</strong>
              <span class="badge text-bg-secondary" id="threeMonthText">參考 - 至 -</span>
            </div>
            <div class="progress">
              <div class="progress-bar" id="monthlyProgressBar" style="width:0%">0%</div>
            </div>
            <div class="small text-muted mt-2" id="monthlyHintText">-</div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card rounded-3 h-100">
          <div class="card-header">
            <i class="fa-solid fa-chalkboard-user me-1"></i>
            <span id="trainingYearTitleText">----年常年訓練次數</span>
          </div>
          <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
              <strong id="annualTrainingText">0 / 12 次</strong>
            </div>
            <div class="progress">
              <div class="progress-bar" id="annualTrainingProgressBar" style="width:0%">0%</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-lg-5">
        <div class="card rounded-3 h-100">
          <div class="card-header">
            <i class="fa-solid fa-list-check me-1"></i>義消訓練
          </div>
          <div class="card-body">
            <ul class="list-group" id="volunteerTrainingList">
              <li class="list-group-item d-flex justify-content-between">
                <span>-</span><strong>-</strong>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="col-lg-7 d-none" id="awardEligibilityCard">
        <div class="card rounded-3 h-100">
          <div class="card-header">
            <i class="fa-solid fa-scale-balanced me-1"></i>獎項資格判斷
          </div>
          <div class="card-body">
            <div id="awardEligibilityList">-</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content rounded-3">
        <div class="modal-header">
          <h5 class="modal-title">
            <i class="fa-solid fa-user-gear me-1"></i>切換使用者
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">單位</label>
              <input type="text" class="form-control readonly-field" id="modalUnitInput" readonly value="-">
            </div>
            <div class="col-6">
              <label class="form-label">職稱</label>
              <input type="text" class="form-control readonly-field" id="modalTitleInput" readonly value="-">
            </div>
            <div class="col-12">
              <label class="form-label">姓名</label>
              <select class="form-select" id="modalNameSelect">
                <option value="">請選擇人員</option>
              </select>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" id="confirmUserButton">確認</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="navbar.js"></script>
    <script src="trainingEligibility.js"></script>
    <script src="awardEligibility.js"></script>
    <script src="index.js"></script>
</body>
</html>
