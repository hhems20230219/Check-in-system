<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新興救護分隊出勤管理系統</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <link href="./index.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fa-solid fa-truck-medical me-2"></i>新興救護分隊出勤管理系統
            </a>

            <div class="ms-auto d-flex align-items-center gap-3">
                <span><i class="fa-solid fa-building me-1"></i><span id="navUnit">-</span></span>
                <span><i class="fa-solid fa-id-badge me-1"></i><span id="navTitle">-</span></span>
                <span><i class="fa-solid fa-user me-1"></i><span id="navName">-</span></span>
                <button id="btnOpenUserModal" class="btn btn-outline-primary btn-sm fw-bold">
                    <i class="fa-solid fa-right-left me-1"></i>切換
                </button>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <section class="card rounded-4 mb-3">
            <div class="card-body text-center bg-dark text-white rounded-4">
                <div id="currentTime" class="display-5 fw-bold">00:00:00</div>
                <div id="currentDate" class="small">YYYY-MM-DD</div>
            </div>
        </section>

        <section class="card rounded-4 mb-3">
            <div class="card-body">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                    <div>
                        <h5 class="card-title mb-1">
                            <i class="fa-solid fa-location-dot me-2"></i>定位狀態
                        </h5>
                        <div id="locationStatus" class="text-muted">尚未定位</div>
                    </div>
                    <button id="btnRefreshLocation" class="btn btn-outline-success fw-bold">
                        <i class="fa-solid fa-location-crosshairs me-1"></i>重新定位
                    </button>
                </div>
            </div>
        </section>

        <section id="alertArea" class="alert d-none" role="alert"></section>

        <section class="card rounded-4 mb-3">
            <div class="card-body d-grid gap-2">
                <button id="btnOpenCheckInModal" class="btn btn-primary btn-lg fw-bold">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>簽到
                </button>
                <button id="btnOpenCheckOutModal" class="btn btn-warning btn-lg fw-bold">
                    <i class="fa-solid fa-right-from-bracket me-2"></i>簽退
                </button>
            </div>
        </section>

        <!-- Summary：一行由左至右 -->
        <section class="row g-3 mb-3">
            <div class="col-12 col-md-4">
                <div class="card rounded-4 h-100">
                    <div class="card-body text-center">
                        <h6 class="fw-bold mb-2">總協勤時數</h6>
                        <div class="summary-number"><span id="summaryTotalHours">0</span> 小時</div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card rounded-4 h-100">
                    <div class="card-body">
                        <h6 class="fw-bold text-center mb-2">本月協勤時數</h6>
                        <div class="summary-number text-center"><span id="summaryMonthHours">0</span> 小時</div>
                        <div class="progress mt-2">
                            <div id="monthProgress" class="progress-bar" style="width:0%">0%</div>
                        </div>
                        <div id="monthRuleText" class="small text-muted text-center mt-2">每月 4 小時</div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card rounded-4 h-100">
                    <div class="card-body">
                        <h6 class="fw-bold text-center mb-2"><span id="summaryTrainingYear"></span> 常年訓練</h6>
                        <div class="progress mt-2">
                            <div id="trainingProgress" class="progress-bar bg-info" style="width:0%">0%</div>
                        </div>
                        <div class="small text-muted text-center mt-2">
                            <span id="summaryTrainingCount">0</span>/12 次
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="card rounded-4">
            <div class="card-body">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
                    <h5 class="card-title mb-0">
                        <i class="fa-solid fa-table me-2"></i>出勤紀錄
                    </h5>
                    <input id="monthFilter" type="month" class="form-control w-auto">
                </div>

                <table id="attendanceTable" class="table table-striped table-bordered nowrap w-100">
                    <thead>
                        <tr>
                            <th>協勤種類</th>
                            <th>服勤類別</th>
                            <th>簽到日期</th>
                            <th>簽到時間</th>
                            <th>簽退日期</th>
                            <th>簽退時間</th>
                            <th>時數</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 切換使用者 Modal -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">切換使用者</h5>
                </div>
                <div class="modal-body">
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">單位</label>
                            <input id="userUnit" class="form-control" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label">職稱</label>
                            <input id="userTitle" class="form-control" readonly>
                        </div>
                    </div>

                    <label class="form-label">姓名</label>
                    <select id="userSelect" class="form-select"></select>
                </div>
                <div class="modal-footer">
                    <button id="btnSaveUser" class="btn btn-primary fw-bold">確定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 簽到 Modal -->
    <div class="modal fade" id="checkInModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">簽到</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="checkInMessage" class="alert alert-danger d-none"></div>

                    <label class="form-label">協勤種類</label>
                    <select id="checkInType" class="form-select mb-3">
                        <option value="協勤">協勤</option>
                        <option value="常年訓練">常年訓練</option>
                        <option value="公差勤務">公差勤務</option>
                    </select>

                    <div id="trainingActionArea" class="mb-3 d-none">
                        <label class="form-label">常年訓練狀態</label>
                        <select id="trainingAction" class="form-select">
                            <option value="簽到">簽到</option>
                            <option value="請假">請假</option>
                        </select>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">職稱</label>
                            <input id="checkInTitle" class="form-control" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label">姓名</label>
                            <input id="checkInName" class="form-control" readonly>
                        </div>
                    </div>

                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label">簽到日期</label>
                            <input id="checkInDate" type="date" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label">簽到時間</label>
                            <select id="checkInTime" class="form-select"></select>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button id="btnSubmitCheckIn" class="btn btn-primary fw-bold">送出簽到</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 簽退 Modal -->
    <div class="modal fade" id="checkOutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">簽退</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="checkOutMessage" class="alert alert-danger d-none"></div>

                    <label class="form-label">協勤種類</label>
                    <select id="checkOutType" class="form-select mb-3">
                        <option value="協勤">協勤</option>
                        <option value="公差勤務">公差勤務</option>
                    </select>

                    <div id="serviceTypeArea" class="mb-3">
                        <label class="form-label">服勤類別</label>
                        <select id="serviceType" class="form-select">
                            <option value="待命協勤">待命協勤</option>
                            <option value="出勤">出勤</option>
                        </select>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">職稱</label>
                            <input id="checkOutTitle" class="form-control" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label">姓名</label>
                            <input id="checkOutName" class="form-control" readonly>
                        </div>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">簽退日期</label>
                            <input id="checkOutDate" type="date" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label">簽退時間</label>
                            <select id="checkOutTime" class="form-select"></select>
                        </div>
                    </div>

                    <div id="workContentArea" class="mb-3">
                        <label class="form-label">工作內容</label>
                        <textarea id="workContent" class="form-control" rows="3"></textarea>
                    </div>

                    <label class="form-label">簽名</label>
                    <canvas id="signatureCanvas" class="border rounded-3 w-100" height="180"></canvas>
                    <button id="btnClearSignature" type="button" class="btn btn-outline-secondary btn-sm mt-2">
                        清除簽名
                    </button>
                </div>

                <div class="modal-footer">
                    <button id="btnSubmitCheckOut" class="btn btn-warning fw-bold">送出簽退</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

    <script src="./location.js"></script>
    <script src="./index.js"></script>
</body>
</html>
