<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新興救護義消出勤系統</title>

    <!-- PWA -->
    <meta name="theme-color" content="#212529">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="義消出勤">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <span class="navbar-brand">
                <i class="fa-solid fa-house-medical me-2"></i>
                新興救護義消出勤系統
            </span>

            <div class="d-flex flex-wrap align-items-center gap-2 ms-auto">
                <span class="navbar-info-item">
                    <i class="fa-solid fa-building-user"></i>
                    <span id="navDepartment">分隊部</span>
                </span>

                <span class="navbar-info-item">
                    <i class="fa-solid fa-id-badge"></i>
                    <span id="navTitle">幹事</span>
                </span>

                <span class="navbar-info-item">
                    <i class="fa-solid fa-user"></i>
                    <span id="navName">吳宇樺</span>
                </span>

                <button class="btn btn-outline-info btn-sm d-none" id="btnInstallApp" type="button">
                    <i class="fa-solid fa-download"></i>
                    安裝 App
                </button>

                <button class="btn btn-outline-light btn-sm" id="btnSwitchUser" type="button">
                    <i class="fa-solid fa-users"></i>
                    切換姓名
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <section class="mb-4">
            <div class="clock-card">
                <div class="clock-time" id="clockTime">00:00:00</div>
                <div class="clock-date" id="clockDate">----年--月--日 星期-</div>
            </div>
        </section>

        <section class="mb-3">
            <div class="card status-card">
                <div class="card-body d-flex flex-column gap-2">
                    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                        <div>
                            <div class="status-label">
                                <i class="fa-solid fa-location-dot"></i>
                                定位狀態
                            </div>
                            <div>
                                <span class="badge text-bg-secondary" id="locationBadge">尚未定位</span>
                            </div>
                            <div class="location-message text-muted" id="locationStatusMessage">尚未取得定位</div>
                        </div>
                        <div>
                            <button class="btn btn-outline-primary btn-sm" id="btnRefreshLocation" type="button">
                                <i class="fa-solid fa-rotate-right"></i>
                                重新定位
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-3 d-none" id="eventReminderSection">
            <div class="card status-card">
                <div class="card-body">
                    <div class="status-label">
                        <i class="fa-solid fa-bell"></i>
                        事件提醒
                    </div>
                    <div class="status-value" id="workStatus"></div>
                </div>
            </div>
        </section>

        <section class="mb-4">
            <div class="card status-card">
                <div class="card-body">
                    <div class="d-grid gap-3 col-12 col-md-4 mx-auto">
                        <button class="btn btn-success btn-lg btn-action" id="btnCheckIn" type="button">
                            <i class="fa-solid fa-right-to-bracket"></i>
                            簽到
                        </button>
                        <button class="btn btn-danger btn-lg btn-action" id="btnCheckOut" type="button">
                            <i class="fa-solid fa-right-from-bracket"></i>
                            簽退
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="card summary-card h-100">
                        <div class="card-body text-center">
                            <div class="summary-title">
                                <i class="fa-regular fa-clock"></i>
                                總協勤時數
                            </div>
                            <div class="summary-value">
                                <span id="totalHours">0.0</span><small class="text-muted ms-1">小時</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card summary-card h-100">
                        <div class="card-body">
                            <div class="text-center mb-3">
                                <div class="summary-title">
                                    <i class="fa-regular fa-calendar-days"></i>
                                    本月協勤時數
                                </div>
                                <div class="summary-value">
                                    <span id="monthHours">0.0</span><small class="text-muted ms-1">小時</small>
                                </div>
                                <div class="text-muted" id="monthHoursProgressText">0.0小時 / 12 小時</div>
                            </div>

                            <div class="progress" role="progressbar" aria-label="本月協勤時數進度">
                                <div class="progress-bar" id="monthHoursProgressBar" style="width: 0%;">0%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="card record-card">
                <div class="card-header bg-white py-3">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
                        <div class="fw-bold" id="recordTitle">
                            <i class="fa-solid fa-table-list"></i>
                            出勤紀錄
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <label class="form-label mb-0 text-muted small" for="filterYearMonth">查詢年月</label>
                            <input type="month" class="form-control form-control-sm" id="filterYearMonth" style="width: 180px;">
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="table-responsive" id="recordTableWrap">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>勤務類別</th>
                                    <th>簽到日期</th>
                                    <th>簽到時間</th>
                                    <th>簽退日期</th>
                                    <th>簽退時間</th>
                                    <th>時數(小時)</th>
                                </tr>
                            </thead>
                            <tbody id="recordTableBody"></tbody>
                        </table>
                    </div>
                    <div class="empty-text d-none" id="emptyText">此年月尚無出勤紀錄</div>
                </div>
            </div>
        </section>
    </main>

    <!-- 切換使用者 Modal -->
    <div class="modal fade" id="switchUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="switchUserForm">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-users"></i>
                            選擇使用者
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-building-user"></i>
                                單位
                            </label>
                            <input type="text" class="form-control locked-field" id="switchUnit" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-id-badge"></i>
                                職稱
                            </label>
                            <input type="text" class="form-control locked-field" id="switchTitle" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-user"></i>
                                姓名
                            </label>
                            <select class="form-select" id="switchName" required></select>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">套用</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="checkInModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="checkInForm">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-right-to-bracket"></i>
                            簽到
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-list-check"></i>
                                勤務類別
                            </label>
                            <select class="form-select" id="checkInShiftType" required>
                                <option value="協勤">協勤</option>
                                <option value="常年訓練">常年訓練</option>
                                <option value="公差勤務">公差勤務</option>
                            </select>
                            <div class="form-note mt-1">協勤、常年訓練需比對 GPS；公差勤務不用比對 GPS。</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-id-badge"></i>
                                職稱
                            </label>
                            <input type="text" class="form-control locked-field" id="checkInTitle" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-user"></i>
                                姓名
                            </label>
                            <select class="form-select" id="checkInName" required></select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-regular fa-calendar"></i>
                                簽到日期
                            </label>
                            <input type="date" class="form-control" id="checkInDate" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-regular fa-clock"></i>
                                簽到時間
                            </label>
                            <select class="form-select" id="checkInTime" required></select>
                            <div class="form-note mt-1">以 00 / 30 為單位。</div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">送出</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="checkOutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <form id="checkOutForm">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-right-from-bracket"></i>
                            簽退
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-list-check"></i>
                                勤務類別
                            </label>
                            <select class="form-select" id="checkOutShiftType" required>
                                <option value="協勤">協勤</option>
                                <option value="常年訓練">常年訓練</option>
                                <option value="公差勤務">公差勤務</option>
                            </select>
                            <div class="form-note mt-1">協勤、常年訓練需比對 GPS；公差勤務不用比對 GPS。</div>
                        </div>

                        <div class="mb-3 d-none" id="checkOutDutyStatusGroup">
                            <label class="form-label">
                                <i class="fa-solid fa-circle-info"></i>
                                狀態
                            </label>
                            <select class="form-select" id="checkOutDutyStatus">
                                <option value="出勤">出勤</option>
                                <option value="備勤">備勤</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-id-badge"></i>
                                職稱
                            </label>
                            <input type="text" class="form-control locked-field" id="checkOutTitle" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-user"></i>
                                姓名
                            </label>
                            <select class="form-select" id="checkOutName" required></select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-regular fa-calendar"></i>
                                簽到日期
                            </label>
                            <input type="date" class="form-control" id="checkOutDate" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-regular fa-clock"></i>
                                簽到時間
                            </label>
                            <select class="form-select" id="checkOutTime" required></select>
                            <div class="form-note mt-1">以 00 / 30 為單位。</div>
                        </div>

                        <div class="mb-3 d-none" id="checkOutWorkContentGroup">
                            <label class="form-label">
                                <i class="fa-regular fa-pen-to-square"></i>
                                工作內容
                            </label>
                            <textarea class="form-control" id="checkOutWorkContent" rows="3" placeholder="請輸入工作內容"></textarea>
                            <div class="form-note mt-1">協勤、公差勤務必填。</div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">
                                <i class="fa-solid fa-signature"></i>
                                手寫簽名
                            </label>
                            <div class="signature-wrap">
                                <canvas id="signatureCanvas" class="signature-canvas"></canvas>
                                <div class="signature-toolbar d-flex justify-content-between align-items-center">
                                    <span class="text-muted small">請於框內簽名</span>
                                    <button type="button" class="btn btn-outline-secondary btn-sm" id="btnClearSignature">
                                        <i class="fa-solid fa-eraser"></i>
                                        清除簽名
                                    </button>
                                </div>
                            </div>
                            <div class="form-note mt-1">簽退必須完成手寫簽名。</div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">送出</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade loading-modal" id="loadingModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <div class="spinner-border text-primary mb-3" role="status" aria-hidden="true"></div>
                    <div class="fw-bold" id="loadingModalTitle">處理中</div>
                    <div class="text-muted small mt-2" id="loadingModalMessage">請稍候...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./location.js"></script>
    <script src="./api.js"></script>
    <script src="./app.js"></script>
</body>
</html>
